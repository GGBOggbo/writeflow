<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cool Editorial Preview</title>
    <style>
      :root {
        --paper: #f3f5f7;
        --paper-strong: #ffffff;
        --ink: #233044;
        --warm: #5f7993;
        --olive: #6c8b74;
        --line: rgba(35, 48, 68, 0.12);
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.92), transparent 24%),
          radial-gradient(circle at 86% 14%, rgba(207, 220, 235, 0.4), transparent 24%),
          linear-gradient(160deg, #f7f9fb 0%, #f3f5f7 44%, #edf1f5 100%);
        font-family: Inter, system-ui, sans-serif;
      }

      [data-composition-id="warm-editorial-preview"] {
        width: 1920px;
        height: 1080px;
        color: var(--ink);
        overflow: hidden;
      }

      .scene {
        width: 100%;
        height: 100%;
        padding: 72px;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        gap: 28px;
        position: relative;
      }

      .hero {
        border: 1px solid rgba(35, 48, 68, 0.14);
        border-radius: 40px;
        padding: 42px 46px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(245, 248, 251, 0.98));
        box-shadow:
          0 30px 90px rgba(27, 39, 53, 0.1),
          inset 0 1px 0 rgba(255, 255, 255, 0.62);
      }

      .kicker {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        font-size: 18px;
        color: rgba(95, 121, 147, 0.92);
      }

      .hero h1 {
        margin: 18px 0 0;
        font-size: 86px;
        line-height: 0.98;
        letter-spacing: -0.05em;
        max-width: 1080px;
      }

      .hero p {
        margin: 22px 0 0;
        max-width: 980px;
        font-size: 28px;
        line-height: 1.6;
        color: rgba(35, 48, 68, 0.8);
      }

      .row {
        display: grid;
        grid-template-columns: 520px 1fr;
        gap: 28px;
        flex: 1;
      }

      .panel,
      .workspace {
        border: 1px solid var(--line);
        border-radius: 34px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow:
          0 20px 60px rgba(28, 39, 52, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.42);
        padding: 28px;
        box-sizing: border-box;
      }

      .panel {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .panel-card,
      .workspace-card {
        border: 1px solid var(--line);
        border-radius: 26px;
        background: rgba(252, 253, 255, 0.98);
        padding: 22px;
      }

      .panel-card h3,
      .workspace-card h3 {
        margin: 0;
        font-size: 20px;
      }

      .panel-card p,
      .workspace-card p {
        margin: 12px 0 0;
        font-size: 18px;
        line-height: 1.58;
        color: rgba(35, 48, 68, 0.76);
      }

      .pill-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 14px;
      }

      .pill {
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 16px;
        background: #eaf1f8;
        color: rgba(35, 48, 68, 0.88);
      }

      .pill.active {
        background: var(--ink);
        color: #fff;
      }

      .workspace-grid {
        margin-top: 16px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
      }
    </style>
  </head>
  <body>
    <div
      data-composition-id="warm-editorial-preview"
      data-start="0"
      data-duration="8"
      data-width="1920"
      data-height="1080"
    >
      <div class="scene">
        <section class="hero">
          <div class="kicker">Cool Editorial</div>
          <h1 id="hero-title">主编陪跑型 AI 共创工作台</h1>
          <p id="hero-copy">
            把一个想法收成切口，定稳策略单，审完结构，再把正文、标题和摘要磨成一份真能发的稿子。
          </p>
        </section>

        <div class="row">
          <aside class="panel">
            <section class="panel-card" id="panel-1">
              <h3>当前任务</h3>
              <p>从多个方向里挑出最值得展开的切口，不急着求快，先做方向判断。</p>
            </section>
            <section class="panel-card" id="panel-2">
              <h3>判断标准</h3>
              <div class="pill-row">
                <span class="pill">痛点够不够硬</span>
                <span class="pill">人群是否清楚</span>
                <span class="pill">切口会不会过挤</span>
              </div>
            </section>
            <section class="panel-card" id="panel-3">
              <h3>策略信号</h3>
              <div class="pill-row">
                <span class="pill active">选题阶段联网增强已开</span>
                <span class="pill">结果优先服务成稿</span>
              </div>
            </section>
          </aside>

          <main class="workspace">
            <div class="kicker">Current Workspace</div>
            <div class="workspace-grid">
              <section class="workspace-card" id="card-1">
                <h3>情绪共鸣视角</h3>
                <p>从成年人压力场景切入，连接熟悉作品与当下困境。</p>
              </section>
              <section class="workspace-card" id="card-2">
                <h3>方法拆解视角</h3>
                <p>把 AI 写作从“代写”拉回“结构化协作”。</p>
              </section>
              <section class="workspace-card" id="card-3">
                <h3>发布包装视角</h3>
                <p>强调 SEO、网感和点击语义，但不牺牲真实表达。</p>
              </section>
            </div>
          </main>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });

        tl.from("#hero-title", {
          y: 42,
          opacity: 0,
          duration: 0.8,
          ease: "power3.out",
        }, 0.18);
        tl.from("#hero-copy", {
          y: 28,
          opacity: 0,
          duration: 0.65,
          ease: "power2.out",
        }, 0.34);
        tl.from("#panel-1", {
          x: -36,
          opacity: 0,
          duration: 0.58,
          ease: "expo.out",
        }, 0.52);
        tl.from("#panel-2", {
          x: -30,
          opacity: 0,
          duration: 0.5,
          ease: "power3.out",
        }, 0.66);
        tl.from("#panel-3", {
          x: -24,
          opacity: 0,
          duration: 0.46,
          ease: "power2.out",
        }, 0.8);
        tl.from("#card-1", {
          y: 34,
          opacity: 0,
          duration: 0.56,
          ease: "power3.out",
        }, 0.74);
        tl.from("#card-2", {
          y: 32,
          opacity: 0,
          duration: 0.52,
          ease: "expo.out",
        }, 0.86);
        tl.from("#card-3", {
          y: 30,
          opacity: 0,
          duration: 0.48,
          ease: "power2.out",
        }, 0.98);

        window.__timelines["warm-editorial-preview"] = tl;
      </script>
    </div>
  </body>
</html>
